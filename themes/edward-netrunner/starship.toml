# ============================================================
#  RADICAL EDWARD'S NETRUNNER PROMPT
#  "The work which becomes a new genre itself, will be called...
#   COWBOY BEBOP"
# ============================================================

# Use a custom format — controls the order of prompt segments
format = """
[┌──](bold #ff6ac1)\
$os\
$username\
[─](bold #ff6ac1)\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$docker_context\
$cmd_duration\
$fill\
$time
[└─](bold #ff6ac1)\
$character"""

# A blank line between prompts for breathing room
add_newline = true

# ── Palette ──────────────────────────────────────────────────
# Ed's aesthetic: warm oranges, electric yellows, neon pinks
# against deep dark backgrounds

[palettes.edward]
# Not directly used by Starship but good to document:
# orange  = "#ff9e64"
# yellow  = "#e0af68"
# pink    = "#ff6ac1"
# cyan    = "#7dcfff"
# green   = "#9ece6a"
# red     = "#f7768e"
# purple  = "#bb9af7"

# ── OS Icon ──────────────────────────────────────────────────
[os]
disabled = false
style = "bold #7dcfff"

[os.symbols]
Linux = " "
Pop = " "

# ── Username ─────────────────────────────────────────────────
[username]
show_always = true
style_user = "bold #ff9e64"
format = "[$user]($style) "

# ── Directory ────────────────────────────────────────────────
[directory]
style = "bold #e0af68"
truncation_length = 3
truncation_symbol = ".../"
read_only = " "
format = "[$path]($style)[$read_only](red) "

# ── Git Branch ───────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold #bb9af7"
format = "on [$symbol$branch]($style) "

# ── Git Status ───────────────────────────────────────────────
[git_status]
style = "bold #f7768e"
format = '([$all_status$ahead_behind]($style) )'
conflicted = " "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = " ${count} "
stashed = " ${count} "
modified = " ${count} "
staged = " ${count} "
deleted = " ${count} "

# ── Node.js ──────────────────────────────────────────────────
[nodejs]
symbol = " "
style = "bold #9ece6a"
format = "[$symbol($version)]($style) "

# ── Python ───────────────────────────────────────────────────
[python]
symbol = " "
style = "bold #e0af68"
format = '[$symbol($version)(\($virtualenv\))]($style) '

# ── Rust ─────────────────────────────────────────────────────
[rust]
symbol = " "
style = "bold #f7768e"
format = "[$symbol($version)]($style) "

# ── Docker ───────────────────────────────────────────────────
[docker_context]
symbol = " "
style = "bold #7dcfff"
format = "[$symbol$context]($style) "

# ── Command Duration ─────────────────────────────────────────
# Shows how long the last command took (only if > 2 seconds)
[cmd_duration]
min_time = 2_000
style = "bold #ff6ac1"
format = "took [$duration]($style) "

# ── Fill ─────────────────────────────────────────────────────
# Fills the gap between left and right prompt
[fill]
symbol = "─"
style = "#3b4261"

# ── Time ─────────────────────────────────────────────────────
[time]
disabled = false
style = "bold #7dcfff"
format = "[$time]($style)"
time_format = "%H:%M"

# ── Prompt Character ─────────────────────────────────────────
# The actual cursor — green on success, red on error
[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"
