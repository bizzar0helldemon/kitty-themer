# ============================================================
#  RADICAL EDWARD'S NETRUNNER TERMINAL — Kitty Config
#  "Ein, Ein, Ein, Ein, Ein!"
# ============================================================


# ── Font ─────────────────────────────────────────────────────
# Your Nerd Font with ligatures enabled
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Ligatures — turns => into arrows, != into ≠, etc.
disable_ligatures never


# ── Unicode Width ────────────────────────────────────────────
# Force ambiguous-width Unicode to single-column rendering.
# Fixes Edelweiss's ASCII sigil alignment (box-drawing + symbols).
narrow_symbols U+2500-U+257F 1
narrow_symbols U+2580-U+259F 1
narrow_symbols U+25A0-U+25FF 1
narrow_symbols U+2600-U+26FF 1
narrow_symbols U+2700-U+27BF 1
narrow_symbols U+00B7 1


# ── Cursor ───────────────────────────────────────────────────
cursor                 #ff6ac1
cursor_text_color      #1a1612
cursor_shape           beam
cursor_beam_thickness  1.8
cursor_blink_interval  0.5


# ── Scrollback ───────────────────────────────────────────────
scrollback_lines       50000
wheel_scroll_multiplier 3


# ── Mouse ────────────────────────────────────────────────────
url_color              #7dcfff
url_style              curly
open_url_with          default
detect_urls            yes
copy_on_select         clipboard


# ── Window Layout ────────────────────────────────────────────
# Ctrl+Shift+Enter = new split
# Ctrl+Shift+T     = new tab
# Ctrl+Shift+Q     = close window
window_padding_width   8
placement_strategy     center
inactive_text_alpha    0.7

# Border around active window (like COSMIC's window hint)
active_border_color    #ff6ac1
inactive_border_color  #4a4238
bell_border_color      #e0af68
window_border_width    1.5pt


# ── Tab Bar ──────────────────────────────────────────────────
tab_bar_edge           top
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_background     #1a1612
active_tab_foreground  #1a1612
active_tab_background  #ff9e64
active_tab_font_style  bold
inactive_tab_foreground #8a7e6e
inactive_tab_background #2a241e
inactive_tab_font_style normal
tab_bar_min_tabs       1
tab_title_template     " {index}: {title} "


# ── Background ───────────────────────────────────────────────
background_opacity     0.92
dynamic_background_opacity yes
# Try: kitty @ set-background-opacity 0.8  (live adjust!)


# ── Audio ────────────────────────────────────────────────────
enable_audio_bell      no
visual_bell_duration   0.1
visual_bell_color      #ff6ac1


# ── Keybindings ──────────────────────────────────────────────
# Splits
map ctrl+shift+enter    new_window
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Tabs
map ctrl+shift+t        new_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab

# Font size (zoom)
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Opacity live adjust
map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1
map ctrl+shift+a>d      set_background_opacity default


# ── Shell ────────────────────────────────────────────────────
shell                  /usr/bin/zsh
editor                 .


# ============================================================
#  EDWARD NETRUNNER — Color Scheme
#  Warm earth tones + neon accents
